<!DOCTYPE html>
<html lang="en">
<head>

  <title>视频背景示例</title>
  <style>
    body, html {

      top: 50%;
      transform: translateY(-50%);
      font-family: Arial, sans-serif;
    }

  <div class="content">
    <h1>欢迎来到我的网站</h1>
    <p>这是一个带有视频背景的示例页面。</p>

  <script>
    // 设置视频音量为50%
